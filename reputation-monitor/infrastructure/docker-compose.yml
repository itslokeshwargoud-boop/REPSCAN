version: "3.9"
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: repuser
      POSTGRES_PASSWORD: reppass
      POSTGRES_DB: reputation_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U repuser -d reputation_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../backend
      dockerfile: ../infrastructure/Dockerfile.backend
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql://repuser:reppass@postgres:5432/reputation_db
      REDIS_URL: redis://redis:6379/0
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../backend:/app

  worker:
    build:
      context: ../backend
      dockerfile: ../infrastructure/Dockerfile.backend
    command: celery -A pipeline.celery_app worker --loglevel=info -Q collection,processing,analysis,detection -c 4
    environment:
      DATABASE_URL: postgresql://repuser:reppass@postgres:5432/reputation_db
      REDIS_URL: redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build:
      context: ../backend
      dockerfile: ../infrastructure/Dockerfile.backend
    command: celery -A pipeline.celery_app beat --loglevel=info --scheduler celery.beat:PersistentScheduler
    env_file:
      - .env
    depends_on:
      - redis

  frontend:
    build:
      context: ../frontend
      dockerfile: ../infrastructure/Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    depends_on:
      - api

volumes:
  postgres_data:
